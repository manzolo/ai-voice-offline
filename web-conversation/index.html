<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Voice Assistant - Conversation Mode</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
      color: #58a6ff;
      font-size: 1.5rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .conversation-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 70%;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1f6feb;
      color: white;
    }

    .message.assistant {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #30363d;
    }

    .message audio {
      margin-top: 0.75rem;
      width: 100%;
      max-width: 400px;
    }

    .message-text {
      line-height: 1.5;
    }

    .input-container {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .status {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.9rem;
      color: #8b949e;
    }

    .status.recording {
      color: #f85149;
      font-weight: bold;
    }

    .status.processing {
      color: #d29922;
      font-weight: bold;
    }

    button {
      padding: 1rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    #recordBtn {
      background: #238636;
      color: white;
      width: 100%;
      font-size: 1.1rem;
    }

    #recordBtn:hover:not(:disabled) {
      background: #2ea043;
    }

    #recordBtn:disabled {
      background: #30363d;
      color: #8b949e;
      cursor: not-allowed;
    }

    #recordBtn.recording {
      background: #da3633;
    }

    #recordBtn.recording:hover {
      background: #f85149;
    }

    #clearBtn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
    }

    #clearBtn:hover {
      background: #30363d;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #8b949e;
    }

    .empty-state h2 {
      color: #c9d1d9;
      margin-bottom: 0.5rem;
    }

    .spinner {
      border: 3px solid #30363d;
      border-top: 3px solid #58a6ff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .error {
      background: #da3633;
      color: white;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      text-align: center;
    }

    select {
      padding: 0.5rem;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #c9d1d9;
      font-size: 0.9rem;
    }

    .badge {
      background: #21262d;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #8b949e;
    }

    .selector-container {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .selector-label {
      font-size: 0.75rem;
      color: #8b949e;
      font-weight: 500;
    }

    #modelSelect,
    #languageSelect {
      min-width: 180px;
    }

    #modelSelect:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .model-help {
      font-size: 0.7rem;
      color: #f85149;
      margin-top: 0.25rem;
      max-width: 300px;
    }

    .model-help a {
      color: #58a6ff;
      text-decoration: none;
    }

    .model-help a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <header>
    <h1>🎤 AI Voice Assistant</h1>
    <div class="controls">
      <div class="selector-container">
        <span class="selector-label" id="modelLabel">AI Model</span>
        <select id="modelSelect" title="Select AI model" disabled>
          <option value="">Loading models...</option>
        </select>
        <div id="modelHelp" class="model-help" style="display: none;"></div>
      </div>
      <div class="selector-container">
        <span class="selector-label" id="languageLabel">Language</span>
        <select id="languageSelect" title="Select language">
          <option value="en">🇬🇧 English</option>
          <option value="it">🇮🇹 Italiano</option>
          <option value="es">🇪🇸 Español</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="pt">🇵🇹 Português</option>
        </select>
      </div>
      <button id="clearBtn">Clear History</button>
    </div>
  </header>

  <div class="conversation-container" id="conversation">
    <div class="empty-state">
      <h2>Start a Conversation</h2>
      <p>Press and hold the button below to record your message.<br>Release to send.</p>
    </div>
  </div>

  <div class="input-container">
    <div id="error" class="error" style="display: none;"></div>
    <div class="status" id="status">Ready to listen</div>
    <button id="recordBtn">Hold to Talk</button>
  </div>

  <script>
    // State management
    let conversationHistory = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let isProcessing = false;
    let currentLanguage = 'en';
    let currentModel = '';
    let availableModels = [];

    // Elements
    const conversation = document.getElementById('conversation');
    const status = document.getElementById('status');
    const recordBtn = document.getElementById('recordBtn');
    const clearBtn = document.getElementById('clearBtn');
    const languageSelect = document.getElementById('languageSelect');
    const languageLabel = document.getElementById('languageLabel');
    const modelSelect = document.getElementById('modelSelect');
    const modelLabel = document.getElementById('modelLabel');
    const modelHelp = document.getElementById('modelHelp');
    const errorDiv = document.getElementById('error');

    // Language names
    const languageNames = {
      'en': 'English',
      'it': 'Italiano',
      'es': 'Español',
      'fr': 'Français',
      'de': 'Deutsch',
      'pt': 'Português'
    };

    // UI Translations
    const translations = {
      en: {
        title: "AI Voice Assistant",
        clearHistory: "Clear History",
        startConversation: "Start a Conversation",
        pressAndHold: "Press and hold the button below to record your message.",
        releaseToSend: "Release to send.",
        holdToTalk: "Hold to Talk",
        releaseToSendBtn: "Release to Send",
        readyToListen: "Ready to listen",
        recording: "🔴 Recording...",
        processing: "Processing...",
        errorTryAgain: "Error - try again",
        clearConfirm: "Clear conversation history?",
        micDenied: "Microphone access denied. Please enable microphone permissions.",
        noAudioRecorded: "No audio recorded",
        aiModel: "AI Model",
        language: "Language",
        loadingModels: "Loading models...",
        noModelsAvailable: "No models available",
        modelHelp: "Run <code>make pull-ollama-model</code> or download via Ollama to use AI models"
      },
      it: {
        title: "Assistente Vocale AI",
        clearHistory: "Cancella Cronologia",
        startConversation: "Inizia una Conversazione",
        pressAndHold: "Tieni premuto il pulsante qui sotto per registrare il tuo messaggio.",
        releaseToSend: "Rilascia per inviare.",
        holdToTalk: "Tieni Premuto per Parlare",
        releaseToSendBtn: "Rilascia per Inviare",
        readyToListen: "Pronto ad ascoltare",
        recording: "🔴 Registrazione...",
        processing: "Elaborazione...",
        errorTryAgain: "Errore - riprova",
        clearConfirm: "Cancellare la cronologia della conversazione?",
        micDenied: "Accesso al microfono negato. Abilita i permessi del microfono.",
        noAudioRecorded: "Nessun audio registrato",
        aiModel: "Modello AI",
        language: "Lingua",
        loadingModels: "Caricamento modelli...",
        noModelsAvailable: "Nessun modello disponibile",
        modelHelp: "Esegui <code>make pull-ollama-model</code> o scarica tramite Ollama per usare i modelli AI"
      },
      es: {
        title: "Asistente de Voz IA",
        clearHistory: "Borrar Historial",
        startConversation: "Iniciar una Conversación",
        pressAndHold: "Mantén presionado el botón para grabar tu mensaje.",
        releaseToSend: "Suelta para enviar.",
        holdToTalk: "Mantén para Hablar",
        releaseToSendBtn: "Suelta para Enviar",
        readyToListen: "Listo para escuchar",
        recording: "🔴 Grabando...",
        processing: "Procesando...",
        errorTryAgain: "Error - intenta de nuevo",
        clearConfirm: "¿Borrar historial de conversación?",
        micDenied: "Acceso al micrófono denegado. Habilita los permisos del micrófono.",
        noAudioRecorded: "No se grabó audio",
        aiModel: "Modelo IA",
        language: "Idioma",
        loadingModels: "Cargando modelos...",
        noModelsAvailable: "No hay modelos disponibles",
        modelHelp: "Ejecuta <code>make pull-ollama-model</code> o descarga a través de Ollama para usar modelos IA"
      },
      fr: {
        title: "Assistant Vocal IA",
        clearHistory: "Effacer l'Historique",
        startConversation: "Commencer une Conversation",
        pressAndHold: "Maintenez le bouton enfoncé pour enregistrer votre message.",
        releaseToSend: "Relâchez pour envoyer.",
        holdToTalk: "Maintenir pour Parler",
        releaseToSendBtn: "Relâcher pour Envoyer",
        readyToListen: "Prêt à écouter",
        recording: "🔴 Enregistrement...",
        processing: "Traitement...",
        errorTryAgain: "Erreur - réessayez",
        clearConfirm: "Effacer l'historique de la conversation ?",
        micDenied: "Accès au microphone refusé. Veuillez activer les autorisations du microphone.",
        noAudioRecorded: "Aucun audio enregistré",
        aiModel: "Modèle IA",
        language: "Langue",
        loadingModels: "Chargement des modèles...",
        noModelsAvailable: "Aucun modèle disponible",
        modelHelp: "Exécutez <code>make pull-ollama-model</code> ou téléchargez via Ollama pour utiliser les modèles IA"
      },
      de: {
        title: "KI-Sprachassistent",
        clearHistory: "Verlauf Löschen",
        startConversation: "Konversation Starten",
        pressAndHold: "Halten Sie die Taste gedrückt, um Ihre Nachricht aufzunehmen.",
        releaseToSend: "Loslassen zum Senden.",
        holdToTalk: "Halten zum Sprechen",
        releaseToSendBtn: "Loslassen zum Senden",
        readyToListen: "Bereit zuzuhören",
        recording: "🔴 Aufnahme...",
        processing: "Verarbeitung...",
        errorTryAgain: "Fehler - erneut versuchen",
        clearConfirm: "Konversationsverlauf löschen?",
        micDenied: "Mikrofonzugriff verweigert. Bitte aktivieren Sie die Mikrofonberechtigungen.",
        noAudioRecorded: "Kein Audio aufgenommen",
        aiModel: "KI-Modell",
        language: "Sprache",
        loadingModels: "Modelle werden geladen...",
        noModelsAvailable: "Keine Modelle verfügbar",
        modelHelp: "Führen Sie <code>make pull-ollama-model</code> aus oder laden Sie über Ollama herunter, um KI-Modelle zu verwenden"
      },
      pt: {
        title: "Assistente de Voz IA",
        clearHistory: "Limpar Histórico",
        startConversation: "Iniciar uma Conversa",
        pressAndHold: "Mantenha o botão pressionado para gravar sua mensagem.",
        releaseToSend: "Solte para enviar.",
        holdToTalk: "Segurar para Falar",
        releaseToSendBtn: "Soltar para Enviar",
        readyToListen: "Pronto para ouvir",
        recording: "🔴 Gravando...",
        processing: "Processando...",
        errorTryAgain: "Erro - tente novamente",
        clearConfirm: "Limpar histórico de conversa?",
        micDenied: "Acesso ao microfone negado. Ative as permissões do microfone.",
        noAudioRecorded: "Nenhum áudio gravado",
        aiModel: "Modelo IA",
        language: "Idioma",
        loadingModels: "Carregando modelos...",
        noModelsAvailable: "Nenhum modelo disponível",
        modelHelp: "Execute <code>make pull-ollama-model</code> ou baixe via Ollama para usar modelos IA"
      }
    };

    // API URLs
    const getConversationUrl = () => {
      const hostname = window.location.hostname;
      return `http://${hostname}:9877/api/conversation`;
    };

    const getOllamaUrl = () => {
      const hostname = window.location.hostname;
      return `http://${hostname}:11434/api/tags`;
    };

    // Fetch available Ollama models
    async function fetchOllamaModels() {
      try {
        const response = await fetch(getOllamaUrl());
        if (!response.ok) {
          throw new Error('Failed to fetch models');
        }
        const data = await response.json();
        availableModels = data.models || [];

        // Populate model selector
        modelSelect.innerHTML = '';
        if (availableModels.length === 0) {
          modelSelect.innerHTML = `<option value="">${translations[currentLanguage].noModelsAvailable}</option>`;
          modelSelect.disabled = true;
          // Show help text
          modelHelp.innerHTML = translations[currentLanguage].modelHelp;
          modelHelp.style.display = 'block';
        } else {
          availableModels.forEach((model, index) => {
            const option = document.createElement('option');
            option.value = model.name;
            // Format model name for display (e.g., "tinyllama:1.1b (1B params)")
            const params = model.details?.parameter_size || '';
            option.textContent = params ? `${model.name} (${params})` : model.name;
            modelSelect.appendChild(option);

            // Select first model by default
            if (index === 0) {
              currentModel = model.name;
              modelSelect.value = model.name;
            }
          });
          modelSelect.disabled = false;
          // Hide help text when models are available
          modelHelp.style.display = 'none';
        }
      } catch (error) {
        console.error('Error fetching Ollama models:', error);
        modelSelect.innerHTML = `<option value="">${translations[currentLanguage].noModelsAvailable}</option>`;
        modelSelect.disabled = true;
        // Show help text on error
        modelHelp.innerHTML = translations[currentLanguage].modelHelp;
        modelHelp.style.display = 'block';
      }
    }

    // Initialize
    async function init() {
      try {
        // Request microphone permission
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop()); // Stop immediately
        console.log('Microphone access granted');
      } catch (error) {
        showError(translations[currentLanguage].micDenied);
        recordBtn.disabled = true;
      }

      // Initialize UI with current language
      updateUILanguage(currentLanguage);

      // Fetch available Ollama models
      await fetchOllamaModels();
    }

    // Update UI language
    function updateUILanguage(lang) {
      const t = translations[lang] || translations['en'];

      // Update title
      document.querySelector('h1').textContent = `🎤 ${t.title}`;

      // Update buttons
      clearBtn.textContent = t.clearHistory;
      recordBtn.textContent = t.holdToTalk;

      // Update labels
      modelLabel.textContent = t.aiModel;
      languageLabel.textContent = t.language;

      // Update model help text if visible
      if (modelHelp.style.display === 'block') {
        modelHelp.innerHTML = t.modelHelp;
      }

      // Update empty state if visible
      const emptyState = conversation.querySelector('.empty-state');
      if (emptyState) {
        emptyState.innerHTML = `
          <h2>${t.startConversation}</h2>
          <p>${t.pressAndHold}<br>${t.releaseToSend}</p>
        `;
      }

      // Update status if it's in default state
      if (!isRecording && !isProcessing) {
        status.textContent = t.readyToListen;
      }
    }

    // Language change
    languageSelect.addEventListener('change', (e) => {
      currentLanguage = e.target.value;
      updateUILanguage(currentLanguage);
    });

    // Model selection change
    modelSelect.addEventListener('change', (e) => {
      currentModel = e.target.value;
      console.log('Model changed to:', currentModel);
    });

    // Recording: Press and hold
    recordBtn.addEventListener('mousedown', startRecording);
    recordBtn.addEventListener('mouseup', stopRecording);
    recordBtn.addEventListener('mouseleave', (e) => {
      if (isRecording) stopRecording();
    });

    // Touch events for mobile
    recordBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startRecording();
    });
    recordBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      stopRecording();
    });

    async function startRecording() {
      if (isProcessing || isRecording) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(track => track.stop());
          await processRecording();
        };

        mediaRecorder.start();
        isRecording = true;
        recordBtn.classList.add('recording');
        recordBtn.textContent = translations[currentLanguage].releaseToSendBtn;
        status.textContent = translations[currentLanguage].recording;
        status.className = 'status recording';
        hideError();
      } catch (error) {
        showError(translations[currentLanguage].errorTryAgain + ': ' + error.message);
      }
    }

    function stopRecording() {
      if (!isRecording) return;

      mediaRecorder.stop();
      isRecording = false;
      recordBtn.classList.remove('recording');
      recordBtn.textContent = translations[currentLanguage].holdToTalk;
    }

    async function processRecording() {
      if (audioChunks.length === 0) {
        status.textContent = translations[currentLanguage].noAudioRecorded;
        status.className = 'status';
        return;
      }

      isProcessing = true;
      recordBtn.disabled = true;
      status.innerHTML = '<span class="spinner"></span>' + translations[currentLanguage].processing;
      status.className = 'status processing';

      try {
        // Create audio blob
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

        // Prepare form data
        const formData = new FormData();
        formData.append('audio', audioBlob, 'audio.webm');
        formData.append('context', JSON.stringify(conversationHistory));
        formData.append('language', currentLanguage);
        if (currentModel) {
          formData.append('model', currentModel);
        }

        // Send to API
        const response = await fetch(getConversationUrl(), {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const error = await response.text();
          throw new Error(error || `Server error: ${response.status}`);
        }

        const result = await response.json();

        // Update conversation history
        conversationHistory.push(
          { role: 'user', content: result.transcription },
          { role: 'assistant', content: result.response_text }
        );

        // Display messages
        addMessage('user', result.transcription);
        addMessage('assistant', result.response_text, result.audio_base64);

        // Auto-play response
        setTimeout(() => {
          const lastAudio = conversation.querySelector('.message.assistant:last-child audio');
          if (lastAudio) lastAudio.play();
        }, 100);

        status.textContent = translations[currentLanguage].readyToListen;
        status.className = 'status';

      } catch (error) {
        console.error('Error:', error);
        showError('Error: ' + error.message);
        status.textContent = translations[currentLanguage].errorTryAgain;
        status.className = 'status';
      } finally {
        isProcessing = false;
        recordBtn.disabled = false;
      }
    }

    function addMessage(role, text, audioBase64 = null) {
      // Remove empty state
      const emptyState = conversation.querySelector('.empty-state');
      if (emptyState) emptyState.remove();

      // Create message element
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      const textDiv = document.createElement('div');
      textDiv.className = 'message-text';
      textDiv.textContent = text;
      messageDiv.appendChild(textDiv);

      // Add audio player for assistant messages
      if (role === 'assistant' && audioBase64) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = `data:audio/wav;base64,${audioBase64}`;
        messageDiv.appendChild(audio);
      }

      conversation.appendChild(messageDiv);

      // Scroll to bottom
      conversation.scrollTop = conversation.scrollHeight;
    }

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      errorDiv.style.display = 'none';
    }

    // Clear history
    clearBtn.addEventListener('click', () => {
      const t = translations[currentLanguage];
      if (confirm(t.clearConfirm)) {
        conversationHistory = [];
        conversation.innerHTML = `
          <div class="empty-state">
            <h2>${t.startConversation}</h2>
            <p>${t.pressAndHold}<br>${t.releaseToSend}</p>
          </div>
        `;
        hideError();
      }
    });

    // Initialize on load
    init();
  </script>
</body>

</html>

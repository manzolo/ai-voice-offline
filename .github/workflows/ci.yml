name: CI - Build and Test (CPU)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Create .env file
      run: |
        cat > .env << EOF
        # Core Settings
        DEFAULT_LANGUAGE=en
        DEFAULT_SPEAKER=male
        TZ=UTC
        
        # Ports
        TTS_PORT=9876
        STT_PORT=10300
        OLLAMA_PORT=11434
        CONVERSATION_PORT=9877
        WEB_CONVERSATION_PORT=8080
        
        # Model Settings
        WHISPER_MODEL=tiny
        OLLAMA_MODEL=tinyllama:1.1b
        VOICE_PROFILE=default
        
        # User ID for file permissions
        PUID=1000
        PGID=1000
        
        # Timeouts (extended for CI)
        STT_TIMEOUT=120
        OLLAMA_TIMEOUT=120
        TTS_TIMEOUT=180
        EOF

    - name: Build Docker images (CPU mode)
      run: make build

    - name: Start services (CPU mode)
      run: |
        make up
        echo "Waiting for services to initialize..."
        sleep 60

    - name: Create required directories
      run: |
        mkdir -p tts_models whisper-cache ollama-models voice-profiles

    - name: Check service health
      run: |
        echo "=== Container Status ==="
        docker compose ps
        
        echo ""
        echo "=== Waiting for services to be fully ready (60s more) ==="
        sleep 60
        
        echo ""
        echo "=== Running Service Checks ==="
        make check-services || echo "⚠️ Service checks failed, checking logs..."
        
    - name: Test API functionality
      run: |
        echo "🧪 Testing API Functionality..."
        echo ""
        
        # Test TTS API
        echo "=== Testing TTS API ==="
        curl -X POST http://localhost:9876/api/tts \
          -H "Content-Type: application/json" \
          -d '{"text":"Hello", "language":"en", "speaker":"male"}' \
          --output /tmp/test.wav --silent --show-error --fail
        if [ -f /tmp/test.wav ] && [ -s /tmp/test.wav ]; then
          echo "✅ TTS API: Generated audio file ($(stat -f%z /tmp/test.wav 2>/dev/null || stat -c%s /tmp/test.wav) bytes)"
        else
          echo "❌ TTS API: Failed to generate audio"
          exit 1
        fi
        echo ""
        
        # Test STT API (using the generated audio)
        echo "=== Testing STT API ==="
        STT_RESPONSE=$(curl -X POST http://localhost:10300/v1/audio/transcriptions \
          -F "file=@/tmp/test.wav" \
          -F "model=tiny" \
          --silent --show-error --fail)
        echo "STT Response: $STT_RESPONSE"
        if echo "$STT_RESPONSE" | grep -q "text"; then
          echo "✅ STT API: Successfully transcribed audio"
        else
          echo "❌ STT API: Failed to transcribe"
          exit 1
        fi
        echo ""
        
        # Test Ollama API
        echo "=== Testing Ollama API ==="
        # First, pull a small model for testing
        docker exec ollama ollama pull tinyllama:1.1b
        sleep 5
        
        OLLAMA_RESPONSE=$(curl -X POST http://localhost:11434/api/generate \
          -H "Content-Type: application/json" \
          -d '{"model":"tinyllama:1.1b","prompt":"Say hello in one word","stream":false}' \
          --silent --show-error --fail)
        echo "Ollama Response: $OLLAMA_RESPONSE"
        if echo "$OLLAMA_RESPONSE" | grep -q "response"; then
          echo "✅ Ollama API: Successfully generated response"
        else
          echo "❌ Ollama API: Failed to generate response"
          exit 1
        fi
        echo ""
        
        # Test Conversation API
        echo "=== Testing Conversation API ==="
        CONV_RESPONSE=$(curl -X POST http://localhost:9877/api/conversation \
          -F "audio=@/tmp/test.wav" \
          -F "language=en" \
          --output /tmp/response.wav --silent --show-error --fail --write-out "%{http_code}")
        if [ "$CONV_RESPONSE" = "200" ] && [ -f /tmp/response.wav ] && [ -s /tmp/response.wav ]; then
          echo "✅ Conversation API: Full pipeline successful ($(stat -f%z /tmp/response.wav 2>/dev/null || stat -c%s /tmp/response.wav) bytes)"
        else
          echo "❌ Conversation API: Failed (HTTP $CONV_RESPONSE)"
          exit 1
        fi
        echo ""
        echo "🎉 All API tests passed!"
        
    - name: Show logs on failure
      if: failure()
      run: |
        echo "=== XTTS Log ==="
        docker compose logs xtts | tail -n 50
        echo ""
        echo "=== Whisper Log ==="
        docker compose logs faster-whisper | tail -n 50
        echo ""
        echo "=== Ollama Log ==="
        docker compose logs ollama | tail -n 50
        echo ""
        echo "=== Conversation Log ==="
        docker compose logs conversation | tail -n 50
        echo ""
        echo "=== Web Log ==="
        docker compose logs web-conversation | tail -n 50

    - name: Cleanup
      if: always()
      run: |
        docker compose down -v
        docker system prune -af --volumes
